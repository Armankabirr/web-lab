<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="parent">
        <div id="main">
            <div id="left">
                <div id="left-top">
                    <img id="fblogo" src="assets/communication (1).png" alt="" height="65px" width="65px">
                </div>
                <div id="left-bottom">
                    <div id="fb-moto">
                        <p id="fb-moto">Explore <br>the <br>things <br><span style="color: #1877f2;">you love.</span></p>
                    </div>
                    <div id="fb-image">
                        <img src="assets/image.png" alt="" width="100%" height="100%">
                    </div>
                    
                </div>
            </div>
            <div id="right">
                <p style="padding-bottom: 15px;">Login to facebook</p>
                <input class="input-txt" type="text" placeholder="email or phone number">
                <input class="input-txt" type="password" placeholder="password">
                <button id="login-btn">login</button>
                <a id="forget-pass" href="#">Forgotten password?</a>
                <button id="signup-btn">Create new account</button>
            </div>
        </div>
        <div id="footer"></div>
    </div>
</body>
</html>
