<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="parent">
        <div id="left">
            <div id="title">
                <p style="font-size: 15pt; font-weight: bold; color: white;">UIU LEARNING HUB</p>
            </div>
            <div id="dashboard">
                <div style="height: 10px; width: 100%; background-color: #093383;"></div>
                <div style="display: flex; flex-direction: row;">
                    <div id="white-box"></div>
                    <div id="dash-box">
                        <p>Dashboard</p>
                    </div>
                </div>
            </div>
            <div id="dashboard-items">
                <p>My Courses</p>
                <p>Assignments</p>
                <p>Exams</p>
                <p>Resorces</p>
                <p>Grades & Results</p>
                <p>Calender</p>
                <p>Discurssion Forum</p>
                <p>Settings</p>
            </div>            
        </div>
        <div id="right">
            <div id="right-title">
                <p style="font-size: 20pt; font-family: sans-serif; font-weight: bold;">Welcome to Your learning Dashboard</p>
                <div id="search-bar">
                    <p style="color: gray;">Search courses, resources...</p>
                </div>
            </div>
            <div id="mid-row1">
                <div class="course-card">
                    <div class="in-card one">
                        <p style="font-size: 15pt; font-weight: bold; color: white; padding: 15px 0px 0px 15px;">CSE 4165: Web Programming</p>
                        <p style="color: white; font-size: 10pt; padding: 0px 0px 15px 15px;">Prof.Kabir</p>
                    </div>
                    <div class="progress">
                        <div class="progressbar">
                            <div class="in-progressbar"></div>
                        </div>
                        <div>
                            <p>Progress 75%</p>
                            <p>Grade A</p>
                        </div>
                    </div>
                </div>
                <div class="course-card">

                </div>
                <div class="course-card">

                </div>
            </div>
            <div id="mid-row2"></div>
        </div>
        
    </div>
</body>
</html>
