<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dasahboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="parent">
        <div id="nav-bar">
            <div id="nav-logo">
                <p id="title">Dashboard</p>
            </div>
            <div id="nav-items-list">
                <p class="nav-item active">Home</p>
                <p class="nav-item">Projects</p>
                <p class="nav-item">Tasks</p>
                <p class="nav-item">Reports</p>
                <p class="nav-item">Settings</p>
            </div>  
            <div id="nav-user">
                <div id="nav-user-info">
                    <p id="nav-user-name">John Smith</p>
                    <p id="nav-user-role">Admin</p>
                </div>
                <div class="avatar"><p style="font-size: 15pt; font-weight: bold;">JS</p></div>
            </div>  
        </div>
        <div id="main">
            <p style="font-size: 15pt; font-weight: bold; margin-bottom: 5px;">Hi, John</p>
            <p style="font-size: 10pt; color: gray; margin-bottom: 25px;">Welcome to your dashboard!</p>
            
            <div id="stats-row">
                <div id="user-card">
                    <div class="avatar large" >
                        <p>JS</p>
                    </div>
                    <div id="card-info">
                        <p style="font-size: 15pt; font-weight: bold;">John Smith</p>
                        <p style="font-size: 10pt; color: gray;">Web and Graphic Designer</p>
                    </div>
                    <div id="card-progress">
                        <p style="font-size: 10pt; color: gray; padding-bottom: 5px;">Project Completion</p>
                        <div class="progress-bar">
                            <div class="in-progress blue"></div>
                        </div>
                        <p style="font-size: 10pt; padding-top: 5px;">80%</p>

                        <p style="font-size: 10pt; color: gray; padding-top: 20px; padding-bottom: 5px;">Overall Rating</p>
                        <div class="progress-bar">
                            <div class="in-progress red"></div>
                        </div>
                        <p  style="font-size: 10pt;padding-top: 5px;">7/10</p>
                    </div>
                </div>
                <div id="user-task"></div>
                <div id="user-reveneu"></div>

            </div>

        </div>
    </div>
</body>
</html>
