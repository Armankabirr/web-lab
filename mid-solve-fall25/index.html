<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fall 25</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="parent">
        <div id="nav">
            <div id="nav-logo">
                <h1>ProConnect</h1>
            </div>
            <div id="nav-items">
                <h3 class="item">Features</h3>
                <h3 class="item">Priceing</h3>
                <h3 class="item">Support</h3>
            </div>
        </div>
        <div id="main">
            <div id="main-top">
                <div id="left">

                </div>
                <div id="right">
                    <div id="login-form">
                        <div id="login-title">
                            <p>Start your free trail</p>
                        </div>

                        <div id="inputs">
                            <h4 style="font-size: 10pt; color: gray; margin-bottom: 5px;">Full Name</h4>
                            <input class="input-txt" type="text" placeholder="Juhn Doe">
                            <h4 style="font-size: 10pt; color: gray; margin-bottom: 5px;">Work Email</h4>
                            <input class="input-txt" type="text" placeholder="email@arman.com">
                            <h4 style="font-size: 10pt; color: gray; margin-bottom: 5px;">Choose Password</h4>
                            <input class="input-txt" type="password">
                        </div>
                        <div id="terms">
                            <input type="checkbox">
                            <p>I agree with the <span id="green">terms of services</span></p>
                        </div>
                        <div id="create-sec">
                            <button id="create-btn">Create Account</button>
                            <p>Already a user? <span id="green">Login Here</span></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
