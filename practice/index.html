<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>practice 1</title>
</head>

<body>
    Welcome to Web Programming!
    <table>
        <tr>
            <td>Name: </td>
            <td> <input type="text"> </td>
        </tr>
        <tr>
            <td>Password: </td>
            <td> <input type="password"></td>
        </tr>
        <tr>
            <td>Email: </td>
            <td><input type="email"></td>
        </tr>
        <tr>
            <td>Gender: </td>
            <td> <input type="radio" name="gender">Male</td>
            <td> <input type="radio" name="gender">Female</td>
        </tr>
        <tr>
            <td>Department: </td>
            <td><input type="radio" name="dept">CSE</td>
            <td><input type="radio" name="dept">EEE</td>
            <td><input type="radio" name="dept">BBA</td>
        </tr>
        <tr>
            <td>Language Proficiency: </td>
            <td><input type="checkbox" name="Language">Bengali</td>
            <td><input type="checkbox" name="Language">English</td>
            <td><input type="checkbox" name="Language">Spanish</td>
        </tr>
        <tr>
            <td>Country: </td>
            <td>
                <select>
                    <option disabled="" selected="" hidden="">Select Country</option>
                    <option>Bangladesh</option>
                    <option>USA</option>
                    <option>India</option>
                    <option>Pakistan</option>
                </select>
            </td>
        </tr>
        <tr>
            <td>File:</td>
            <td><input type="file"></td>
        </tr>
        <tr>
            <td>Date of Birth: </td>
            <td><input type="date"></td>
        </tr>
        <tr>
            <td>Age: </td>
            <td><input type="number"></td>
        </tr>
        <tr>
            <td>Photo: </td>
            <td><input type="image"></td>
        </tr>
        <tr>
            <td>Address: </td>
            <td><textarea></textarea></td>
        </tr>
        <tr>
            <td><input type="button" value="submit"></td>
        </tr>
    </table>

</body>

</html>
